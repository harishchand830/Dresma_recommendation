<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dresma Heuristic Playground</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Dresma Heuristic Playground</h1>
        <p>Upload an image to get recommendations from the staging heuristic pipeline.</p>
      </header>

      <div class="controls">
        <div class="upload-section">
            <h2>1. Upload Image</h2>
            <input type="file" id="imageUpload" accept="image/*" />
          <div class="input-group" style="margin-top: 12px;">
            <label for="brand_name">Brand Name (for C6 + C2 brand lookup)</label>
            <input type="text" id="brand_name" placeholder="e.g. Nike" />
          </div>
            <div id="imagePreviewContainer" class="image-preview-container" style="display: none;">
                <img id="imagePreview" src="#" alt="Image Preview" />
                <div id="clusterInfo" class="cluster-info" style="display: none;">
                    Assigned Cluster ID: <span id="clusterId"></span>
                </div>
            </div>
        </div>

        <div class="weights-section">
            <h2>2. Tune Heuristic Weights</h2>
            <div class="input-group">
                <label for="weight_fg">Foreground (C1)</label>
                <input type="number" id="weight_fg" min="0" max="1" step="0.01" value="0.7" />
            </div>
            <div class="input-group">
                <label for="weight_full">Full Image (C2)</label>
                <input type="number" id="weight_full" min="0" max="1" step="0.01" value="0.05" />
            </div>
            <div class="input-group">
                <label for="weight_trend">Trending (C3)</label>
                <input type="number" id="weight_trend" min="0" max="1" step="0.01" value="0.1" />
            </div>
            <div class="input-group">
                <label for="weight_popular">Popular (C4)</label>
                <input type="number" id="weight_popular" min="0" max="1" step="0.01" value="0.1" />
            </div>
            <div class="input-group">
                <label for="weight_fresh">Freshness (C5)</label>
                <input type="number" id="weight_fresh" min="0" max="1" step="0.01" value="0.05" />
            </div>
            <div class="input-group">
              <label for="weight_brand">Brand Similarity (C6)</label>
              <input type="number" id="weight_brand" min="0" max="1" step="0.01" value="0" />
            </div>

            <h2 style="margin-top: 40px;">3. Configure Retrieval</h2>
            <div class="input-group">
                <label for="top_n">Number of Results</label>
                <input type="number" id="top_n" min="1" max="100" step="1" value="40" />
            </div>
        </div>

        <div class="run-section">
            <button id="runButton">Run Heuristic Test</button>
        </div>
      </div>

      <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Running pipeline... (this may take 10-20 seconds)</p>
      </div>

      <div id="error" class="error" style="display: none;"></div>

      <div id="results" class="results-container" style="display: none;">
        <h2>Results</h2>
        <div class="results-grid" id="resultsGrid"></div>
      </div>

      <div id="debug" class="debug-container" style="display: none;">
        <h3>Debug Output</h3>
        <pre id="debugOutput"></pre>
      </div>

    </div>

    <script>
      // --- DOM Elements ---
      const imageUpload = document.getElementById("imageUpload");
      const imagePreviewContainer = document.getElementById("imagePreviewContainer");
      const imagePreview = document.getElementById("imagePreview");
      const runButton = document.getElementById("runButton");
      const loadingDiv = document.getElementById("loading");
      const errorDiv = document.getElementById("error");
      const resultsDiv = document.getElementById("results");
      const resultsGrid = document.getElementById("resultsGrid");
      const clusterInfoDiv = document.getElementById("clusterInfo");
      const debugDiv = document.getElementById("debug");
      const debugOutput = document.getElementById("debugOutput");

      const sliders = {
        weight_fg: document.getElementById("weight_fg"),
        weight_full: document.getElementById("weight_full"),
        weight_trend: document.getElementById("weight_trend"),
        weight_popular: document.getElementById("weight_popular"),
        weight_fresh: document.getElementById("weight_fresh"),
        weight_brand: document.getElementById("weight_brand"),
        top_n: document.getElementById("top_n"),
      };

      // --- Event Listeners ---
      imageUpload.addEventListener("change", (event) => {
        const file = event.target.files[0];
        if (file) {
          imagePreview.src = URL.createObjectURL(file);
          imagePreviewContainer.style.display = "block";
        }
      });

      runButton.addEventListener("click", runPipeline);

      // --- Main Logic ---
      function resetUI() {
        loadingDiv.style.display = "block";
        errorDiv.style.display = "none";
        resultsDiv.style.display = "none";
        debugDiv.style.display = "none";
        clusterInfoDiv.style.display = "none";
        resultsGrid.innerHTML = "";
      }

      async function runPipeline() {
        const imageFile = imageUpload.files[0];
        if (!imageFile) {
          alert("Please upload an image first.");
          return;
        }

        // Reset UI
        resetUI();

        const formData = new FormData();
        formData.append("image", imageFile);
        formData.append("seed", 42);
        formData.append("top_n", sliders.top_n.value);
        formData.append("brand_name", document.getElementById("brand_name").value || "");
        ['weight_fg', 'weight_full', 'weight_trend', 'weight_popular', 'weight_fresh', 'weight_brand'].forEach(id => {
            formData.append(id, sliders[id].value);
        });

        try {
          const response = await fetch("/api/run-from-upload", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.detail ? JSON.stringify(data.detail, null, 2) : "Unknown error");
          }

          displayResults(data.results);
          displayClusterId(data.results.assigned_cluster_id);
          debugOutput.textContent = data.stdout + "\n\n" + data.stderr;
          debugDiv.style.display = "block";

        } catch (err) {
          errorDiv.textContent = `An error occurred: ${err.message}`;
          errorDiv.style.display = "block";
        } finally {
          loadingDiv.style.display = "none";
        }
      }

      function displayClusterId(clusterId) {
        document.getElementById("clusterId").textContent = clusterId;
        clusterInfoDiv.style.display = "block";
      }

      function displayResults(data) {
        resultsDiv.style.display = "block";
        if (!data || !data.results || data.results.length === 0) {
            resultsGrid.innerHTML = "<p>No results returned from the pipeline.</p>";
            return;
        }

        const num = (value, fallback = 0) => {
            const parsed = Number(value);
            return Number.isFinite(parsed) ? parsed : fallback;
        };

        data.results.forEach(item => {
            const card = document.createElement("div");
            card.className = "result-card";

            const isExploration = item.is_exploration ? '<span class="tag exploration">Exploration</span>' : '';
            const channels = item.source_channels.map(c => `<span class="tag channel">${c}</span>`).join(' ');

            card.innerHTML = `
                <img src="${item.image_url}" alt="${item.image_id}" loading="lazy">
                <div class="card-info">
                    <p class="image-id">${item.image_id}</p>
                    <div class="scores">
                        <p><strong>Score:</strong> ${item.model_score.toFixed(4)}</p>
                        <p><strong>Likes:</strong> ${item.likes || 'N/A'}</p>
                        <p><strong>Comments:</strong> ${item.comments || 'N/A'}</p>
                    </div>
                    <div class="details">
                      <p>FG Dist: ${num(item.fg_cosine_distance, 1).toFixed(4)}</p>
                      <p>Full Dist: ${num(item.full_cosine_distance, 1).toFixed(4)}</p>
                      <p>Brand Dist: ${num(item.brand_cosine_distance, 1).toFixed(4)}</p>
                        <p>C2 Source: ${item.full_similarity_source || 'upload_full'}</p>
                      <p>Trend: ${num(item.trend_score).toFixed(3)}</p>
                      <p>Engage: ${num(item.engagement_score).toFixed(3)}</p>
                      <p>Fresh: ${num(item.freshness_score).toFixed(3)}</p>
                    </div>
                    <div class="tags">
                        ${isExploration}
                        ${channels}
                    </div>
                </div>
            `;
            resultsGrid.appendChild(card);
        });
      }
    </script>
  </body>
</html>
