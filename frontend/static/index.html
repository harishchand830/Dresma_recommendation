<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dresma Heuristic Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="hero">
      <h1>Staging Heuristic Playground</h1>
      <p>
        Edit request payload and weights, run the real staging script, and inspect channels, scores, and engagement signals.
      </p>
    </header>

    <main class="layout">
      <section class="panel form-panel">
        <div class="panel-head">
          <h2>Input + Weights</h2>
          <div class="head-actions">
            <button id="refreshUrlsBtn" class="btn ghost" type="button">Refresh URLs</button>
            <button id="loadSampleBtn" class="btn ghost" type="button">Load Existing my_test.json</button>
          </div>
        </div>

        <div class="grid-2">
          <label>Job ID <input id="jobId" type="text" value="123" /></label>
          <label>Seed <input id="seed" type="number" value="42" /></label>
          <label>Intent <input id="intent" type="text" value="Sales" /></label>
          <label>Top N <input id="topN" type="number" value="40" min="1" max="60" /></label>
          <label class="span-2"
            >Created At
            <input id="createdAt" type="text" value="2026-06-18T12:00:00+00:00" />
          </label>
          <label class="span-2">
            Reference Image URL
            <select id="imageUrlSelect"></select>
          </label>
          <label class="span-2">
            Search URL
            <input id="imageUrlSearch" type="text" placeholder="Type to filter URL list..." />
          </label>
        </div>

        <div class="weights">
          <h3>Heuristic Weights</h3>
          <div class="grid-5">
            <label>FG<input id="wFg" type="number" step="0.01" value="0.7" /></label>
            <label>Full<input id="wFull" type="number" step="0.01" value="0.05" /></label>
            <label>Trend<input id="wTrend" type="number" step="0.01" value="0.1" /></label>
            <label>Popular<input id="wPopular" type="number" step="0.01" value="0.1" /></label>
            <label>Fresh<input id="wFresh" type="number" step="0.01" value="0.05" /></label>
          </div>
        </div>

        <div class="actions">
          <button id="runBtn" class="btn primary">Run Staging Heuristic</button>
          <span id="status" class="status">Ready</span>
        </div>
      </section>

      <section class="panel preview-panel">
        <h2>Selected Image</h2>
        <img id="uploadPreview" alt="Uploaded preview" />
        <div id="meta" class="meta"></div>
      </section>
    </main>

    <section class="panel results-panel">
      <div class="panel-head">
        <h2>Recommended Images</h2>
        <span id="resultInfo" class="badge">No run yet</span>
      </div>
      <div id="resultsGrid" class="results-grid"></div>
    </section>

    <script src="/static/app.js"></script>
  </body>
</html>
