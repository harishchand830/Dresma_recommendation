apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: dresma-recommendation-service
  labels:
    app: dresma-recommendation-service
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - name: dresma-rec
          # Replace with Artifact Registry image, e.g.:
          # us-central1-docker.pkg.dev/PROJECT_ID/dresma-rec/dresma-recommendation-service:TAG
          image: IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: ENVIRONMENT
              value: production
            - name: PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: dresma-rec-project-id
                  key: latest
            - name: SPANNER_INSTANCE_ID
              valueFrom:
                secretKeyRef:
                  name: dresma-rec-spanner-instance-id
                  key: latest
            - name: SPANNER_DATABASE_ID
              valueFrom:
                secretKeyRef:
                  name: dresma-rec-spanner-database-id
                  key: latest
            - name: PUBSUB_INTERACTION_TOPIC
              valueFrom:
                secretKeyRef:
                  name: dresma-rec-pubsub-interaction-topic
                  key: latest
          startupProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
